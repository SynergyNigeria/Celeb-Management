<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="StarHub" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Celebrity — StarHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Montserrat","sans-serif"] } } } }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    body { background:#0a0a14; }
    .gradient-text { background:linear-gradient(135deg,#a78bfa,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .tab-active { border-bottom:2px solid #8b5cf6; color:#a78bfa; font-weight:700; }
    .tab-btn { transition:all .2s; }
    .tab-btn:hover { color:#a78bfa; }
  </style>
</head>
<body class="font-sans text-white min-h-screen">
  <!-- Page Transition Overlay -->
  <div id="page-transition" style="position:fixed;inset:0;background:#0a0a14;z-index:9999;pointer-events:none;"></div>

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/index.html" class="text-2xl font-black gradient-text">★ StarHub</a>
      <div id="nav-auth" class="flex items-center"></div>
    </div>
  </nav>

  <!-- HERO COVER -->
  <div id="cover-section" class="relative pt-20 h-80 bg-gray-900 overflow-hidden">
    <img id="cover-img" src="" alt="" class="absolute inset-0 w-full h-full object-cover opacity-40" />
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a14] to-transparent"></div>
  </div>

  <!-- PROFILE HEADER -->
  <div class="max-w-5xl mx-auto px-6 -mt-20 relative z-10">
    <div class="flex flex-col md:flex-row gap-6 items-end mb-8">
      <img id="celeb-photo" src="" alt="" class="w-36 h-36 md:w-44 md:h-44 rounded-2xl object-cover border-4 border-[#0a0a14] shadow-2xl shadow-violet-900/40 flex-shrink-0" />
      <div class="pb-2">
        <div id="celeb-category" class="text-xs font-semibold uppercase tracking-widest text-violet-400 mb-2"></div>
        <h1 id="celeb-name" class="text-4xl md:text-5xl font-black leading-tight"></h1>
        <p id="celeb-tagline" class="text-gray-400 mt-1 text-base"></p>
        <div id="celeb-socials" class="flex gap-4 mt-3 text-sm"></div>
      </div>
      <div class="md:ml-auto flex gap-3 pb-2 flex-wrap">
        <a id="btn-membership" href="#" class="bg-violet-600 hover:bg-violet-500 text-white font-bold px-6 py-2.5 rounded-full transition text-sm">Join Membership</a>
        <a id="btn-donate" href="#" class="bg-amber-500 hover:bg-amber-400 text-black font-bold px-6 py-2.5 rounded-full transition text-sm">Donate</a>
        <a id="btn-events" href="#" class="bg-white/10 hover:bg-white/20 text-white font-bold px-6 py-2.5 rounded-full border border-white/10 transition text-sm">Events</a>
      </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-white/10 mb-8 gap-6">
      <button onclick="showTab('about')" class="tab-btn tab-active pb-3 text-sm" id="tab-about">About</button>
      <button onclick="showTab('memberships')" class="tab-btn pb-3 text-sm text-gray-400" id="tab-memberships">Memberships</button>
      <button onclick="showTab('events')" class="tab-btn pb-3 text-sm text-gray-400" id="tab-events-tab">Events</button>
      <button onclick="showTab('foundations')" class="tab-btn pb-3 text-sm text-gray-400" id="tab-foundations">Foundations</button>
    </div>

    <!-- TAB CONTENT -->
    <div id="pane-about" class="pb-20">
      <div class="grid md:grid-cols-3 gap-8">
        <div class="md:col-span-2">
          <h2 class="text-xl font-bold mb-4">Biography</h2>
          <p id="celeb-bio" class="text-gray-300 leading-relaxed whitespace-pre-line"></p>
        </div>
        <div class="space-y-4">
          <div class="bg-white/5 border border-white/10 rounded-2xl p-5">
            <h3 class="font-bold mb-3 text-sm uppercase tracking-widest text-gray-400">Details</h3>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between"><span class="text-gray-500">Category</span><span id="info-cat" class="capitalize text-violet-300"></span></div>
              <div class="flex justify-between"><span class="text-gray-500">Nationality</span><span id="info-nat" class="text-white"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="pane-memberships" class="hidden pb-20">
      <h2 class="text-xl font-bold mb-6">Membership Tiers</h2>
      <div id="memberships-grid" class="grid md:grid-cols-3 gap-6">
        <div class="animate-pulse bg-white/5 rounded-2xl h-64"></div>
        <div class="animate-pulse bg-white/5 rounded-2xl h-64"></div>
        <div class="animate-pulse bg-white/5 rounded-2xl h-64"></div>
      </div>
    </div>

    <div id="pane-events" class="hidden pb-20">
      <h2 class="text-xl font-bold mb-6">Upcoming Events</h2>
      <div id="events-list" class="space-y-4">
        <div class="animate-pulse bg-white/5 rounded-2xl h-24"></div>
        <div class="animate-pulse bg-white/5 rounded-2xl h-24"></div>
      </div>
    </div>

    <div id="pane-foundations" class="hidden pb-20">
      <h2 class="text-xl font-bold mb-6">Foundations & Causes</h2>
      <div id="foundations-grid" class="grid md:grid-cols-2 gap-6">
        <div class="animate-pulse bg-white/5 rounded-2xl h-48"></div>
        <div class="animate-pulse bg-white/5 rounded-2xl h-48"></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const slug = getParam("slug");
    if (!slug) window.location.href = "/index.html";

    let celebData = null;
    let tabsLoaded = {};

    function showTab(name) {
      ["about","memberships","events","foundations"].forEach(t => {
        document.getElementById(`pane-${t === "events" ? "events" : t}`).classList.add("hidden");
        const tabEl = document.getElementById(`tab-${t === "events" ? "events-tab" : t}`);
        if (tabEl) { tabEl.classList.remove("tab-active"); tabEl.classList.add("text-gray-400"); }
      });
      const paneId = name === "events" ? "pane-events" : `pane-${name}`;
      document.getElementById(paneId).classList.remove("hidden");
      const tabEl = document.getElementById(name === "events" ? "tab-events-tab" : `tab-${name}`);
      if (tabEl) { tabEl.classList.add("tab-active"); tabEl.classList.remove("text-gray-400"); }

      if (!tabsLoaded[name]) {
        tabsLoaded[name] = true;
        if (name === "memberships") loadMemberships();
        if (name === "events") loadEvents();
        if (name === "foundations") loadFoundations();
      }
    }

    const badgeClass = { gray:"bg-gray-700 text-gray-200", blue:"bg-blue-800 text-blue-200", gold:"bg-amber-800 text-amber-200", platinum:"bg-gradient-to-r from-gray-400 to-gray-200 text-gray-900" };

    async function loadMemberships() {
      try {
        const data = await MembershipsAPI.tiers(slug);
        const tiers = data.results || data;
        const grid = document.getElementById("memberships-grid");
        if (!tiers.length) { grid.innerHTML = '<p class="text-gray-500 col-span-3">No membership tiers available yet.</p>'; return; }
        grid.innerHTML = tiers.map(t => `
          <div class="bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col gap-4 hover:border-violet-500/50 transition">
            <div class="flex items-center justify-between">
              <span class="text-xs font-bold px-3 py-1 rounded-full ${badgeClass[t.badge_color] || badgeClass.gray}">${t.name}</span>
              <span class="text-2xl font-black text-violet-300">${formatMoney(t.price)}</span>
            </div>
            <p class="text-gray-400 text-sm flex-1">${t.description}</p>
            <ul class="space-y-1">
              ${(t.benefits || []).map(b => `<li class="text-xs text-gray-300 flex items-center gap-2"><span class="text-violet-400">✓</span>${b}</li>`).join("")}
            </ul>
            <p class="text-xs text-gray-500">${t.duration_days} days validity</p>
            <button onclick="buyMembership(${t.id})" class="bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 rounded-xl text-sm transition">Join Now</button>
          </div>
        `).join("");
      } catch(e) {}
    }

    async function buyMembership(tierId) {
      if (!requireAuth()) return;
      try {
        await MembershipsAPI.purchase(tierId);
        showToast("Membership activated! 🎉");
      } catch(e) {
        showToast(e.detail || "Could not purchase membership.", "error");
      }
    }

    async function loadEvents() {
      try {
        const data = await EventsAPI.list(slug, "upcoming");
        const events = data.results || data;
        const list = document.getElementById("events-list");
        if (!events.length) { list.innerHTML = '<p class="text-gray-500">No upcoming events.</p>'; return; }
        list.innerHTML = events.map(ev => `
          <a href="/event-detail.html?celeb=${slug}&slug=${ev.slug}" class="flex gap-5 bg-white/5 hover:bg-white/8 border border-white/10 hover:border-violet-500/30 rounded-2xl p-5 transition group">
            <img src="${mediaURL(ev.image)}" class="w-20 h-20 rounded-xl object-cover flex-shrink-0" />
            <div class="flex-1 min-w-0">
              <div class="flex gap-2 mb-1 flex-wrap">
                <span class="text-xs bg-violet-900/60 text-violet-300 px-2 py-0.5 rounded capitalize">${ev.event_type}</span>
                ${ev.is_free ? '<span class="text-xs bg-green-900/60 text-green-300 px-2 py-0.5 rounded">Free</span>' : `<span class="text-xs bg-amber-900/60 text-amber-300 px-2 py-0.5 rounded">${formatMoney(ev.ticket_price)}</span>`}
              </div>
              <h3 class="font-bold truncate group-hover:text-violet-300 transition">${ev.title}</h3>
              <p class="text-sm text-gray-400 mt-1">📅 ${formatDate(ev.event_date)} · 📍 ${ev.location}</p>
            </div>
          </a>
        `).join("");
      } catch(e) {}
    }

    async function loadFoundations() {
      try {
        const data = await DonationsAPI.foundations(slug);
        const foundations = data.results || data;
        const grid = document.getElementById("foundations-grid");
        if (!foundations.length) { grid.innerHTML = '<p class="text-gray-500 col-span-2">No foundations listed yet.</p>'; return; }
        grid.innerHTML = foundations.map(f => `
          <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden hover:border-violet-500/30 transition">
            <img src="${mediaURL(f.cover_image)}" class="w-full h-36 object-cover" />
            <div class="p-5">
              <h3 class="font-bold text-lg">${f.name}</h3>
              <p class="text-gray-400 text-sm mt-1 mb-4 line-clamp-2">${f.description}</p>
              <div class="mb-2 flex justify-between text-xs text-gray-500">
                <span>${formatMoney(f.amount_raised)} raised</span>
                <span>${f.progress_pct}%</span>
              </div>
              <div class="w-full bg-white/10 rounded-full h-2 mb-4">
                <div class="bg-violet-500 h-2 rounded-full transition-all" style="width:${Math.min(f.progress_pct,100)}%"></div>
              </div>
              <a href="/donate.html?foundation=${f.id}" class="block text-center bg-amber-500 hover:bg-amber-400 text-black font-bold py-2.5 rounded-xl text-sm transition">Donate Now</a>
            </div>
          </div>
        `).join("");
      } catch(e) {}
    }

    async function init() {
      updateNavAuth();
      try {
        celebData = await CelebsAPI.detail(slug);
        document.title = `${celebData.name} — StarHub`;
        document.getElementById("celeb-name").textContent = celebData.name;
        document.getElementById("celeb-tagline").textContent = celebData.tagline || "";
        document.getElementById("celeb-bio").textContent = celebData.bio || "";
        document.getElementById("celeb-category").textContent = celebData.category;
        document.getElementById("info-cat").textContent = celebData.category;
        document.getElementById("info-nat").textContent = celebData.nationality || "—";
        document.getElementById("celeb-photo").src = mediaURL(celebData.photo);
        document.getElementById("cover-img").src = mediaURL(celebData.cover_image || celebData.photo);
        document.getElementById("btn-membership").href = `/membership.html?slug=${slug}`;
        document.getElementById("btn-donate").href = `/donate.html?celeb=${slug}`;
        document.getElementById("btn-events").href = `/events.html?celeb=${slug}`;

        const socials = [];
        if (celebData.instagram) socials.push(`<a href="${celebData.instagram}" target="_blank" class="text-pink-400 hover:text-pink-300">Instagram</a>`);
        if (celebData.twitter) socials.push(`<a href="${celebData.twitter}" target="_blank" class="text-sky-400 hover:text-sky-300">Twitter / X</a>`);
        if (celebData.youtube) socials.push(`<a href="${celebData.youtube}" target="_blank" class="text-red-400 hover:text-red-300">YouTube</a>`);
        document.getElementById("celeb-socials").innerHTML = socials.join('<span class="text-gray-700">·</span>');
      } catch(e) {
        document.getElementById("celeb-name").textContent = "Celebrity not found";
      }
    }

    init();
  </script>

  <script>
    // === GSAP Animations ===
    gsap.registerPlugin(ScrollTrigger);

    // 1. Fade page in
    gsap.to("#page-transition", {
      opacity: 0, duration: 0.5, ease: "power2.out", delay: 0.05,
      onComplete() { const el = document.getElementById("page-transition"); if (el) el.style.display = "none"; }
    });

    // 2. Cover section fade-in
    gsap.from("#cover-section", { opacity: 0, duration: 0.8, ease: "power2.out" });

    // 3. Profile header entrance
    gsap.timeline({ delay: 0.3 })
      .from("#celeb-photo", { opacity: 0, scale: 0.85, duration: 0.6, ease: "back.out(1.4)" })
      .from("#celeb-category, #celeb-name, #celeb-tagline, #celeb-socials", { opacity: 0, y: 20, duration: 0.55, ease: "power3.out", stagger: 0.1 }, "-=0.3")
      .from("#btn-membership, #btn-donate, #btn-events", { opacity: 0, y: 15, duration: 0.45, ease: "power3.out", stagger: 0.08 }, "-=0.3");

    // 4. Tab content cards — animate when dynamically populated
    ["memberships-grid", "events-list", "foundations-grid"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      new MutationObserver(() => {
        const items = el.querySelectorAll(":scope > *:not(.gsap-done)");
        if (items.length) {
          items.forEach(i => i.classList.add("gsap-done"));
          gsap.from(items, { opacity: 0, y: 30, duration: 0.5, ease: "power3.out", stagger: 0.09 });
        }
      }).observe(el, { childList: true });
    });

    // 5. Page-out transition on internal link clicks
    function _pageOut(dest) {
      const o = document.getElementById("page-transition");
      if (!o) { window.location.href = dest; return; }
      o.style.display = "block";
      gsap.fromTo(o, { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power2.in", onComplete: () => { window.location.href = dest; } });
    }
    document.addEventListener("click", e => {
      const link = e.target.closest("a[href]");
      if (!link) return;
      try {
        const u = new URL(link.href);
        if (u.hostname === location.hostname && !link.href.startsWith("#") && link.target !== "_blank") {
          e.preventDefault(); _pageOut(link.href);
        }
      } catch (_) {}
    });
  </script>
</body>
</html>
