<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="StarHub" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Events — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Montserrat","sans-serif"] } } } }</script>
  <style>body{background:#07070f;} .gradient-text{background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;} .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s;color:#9ca3af;} .sidebar-link:hover,.sidebar-link.active{background:rgba(139,92,246,0.15);color:#a78bfa;}</style>
</head>
<body class="font-sans text-white min-h-screen flex">

  <aside class="w-60 min-h-screen bg-black/60 border-r border-white/5 flex flex-col p-5 fixed top-0 left-0 z-40">
    <a href="/index.html" class="text-xl font-black gradient-text mb-8">★ StarHub</a>
    <div class="text-xs text-gray-600 uppercase tracking-widest mb-3 px-2">Admin Panel</div>
    <nav class="space-y-1 flex-1">
      <a href="/admin-panel/index.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin-panel/celebrities.html" class="sidebar-link">🌟 Celebrities</a>
      <a href="/admin-panel/events.html" class="sidebar-link active">🎟 Events</a>
      <a href="/admin-panel/memberships.html" class="sidebar-link">🎖 Memberships</a>
      <a href="/admin-panel/foundations.html" class="sidebar-link">❤️ Foundations</a>
      <a href="/admin-panel/users.html" class="sidebar-link">👥 Users</a>
    </nav>
    <div class="border-t border-white/5 pt-4 mt-4 space-y-2">
      <a href="http://127.0.0.1:8000/admin/" target="_blank" class="sidebar-link text-amber-400 hover:text-amber-300">⚙️ Django Admin</a>
      <a href="/index.html" class="sidebar-link">🏠 View Site</a>
      <button onclick="AuthAPI.logout()" class="sidebar-link w-full text-left text-red-400 hover:text-red-300">🚪 Logout</button>
    </div>
  </aside>

  <div class="ml-60 flex-1 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-black">🎟 <span class="gradient-text">Events</span></h1>
        <p class="text-gray-500 text-sm mt-1">Manage all celebrity events</p>
      </div>
      <a href="http://127.0.0.1:8000/admin/events/event/add/" target="_blank"
         class="bg-violet-600 hover:bg-violet-500 text-white font-bold px-6 py-2.5 rounded-full text-sm transition">
        + Add Event
      </a>
    </div>

    <!-- Filters -->
    <div class="flex gap-3 mb-6 flex-wrap">
      <select id="celeb-filter" class="bg-white/5 border border-white/10 rounded-full px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">All Celebrities</option>
      </select>
      <select id="status-filter" class="bg-white/5 border border-white/10 rounded-full px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">All Status</option>
        <option value="upcoming">Upcoming</option>
        <option value="ongoing">Ongoing</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Table -->
    <div class="bg-white/3 border border-white/8 rounded-2xl overflow-x-auto">
      <table class="w-full text-sm min-w-[700px]">
        <thead>
          <tr class="border-b border-white/8 text-gray-500 text-xs uppercase tracking-widest">
            <th class="text-left px-5 py-4">Event</th>
            <th class="text-left px-5 py-4">Celebrity</th>
            <th class="text-left px-5 py-4">Date</th>
            <th class="text-left px-5 py-4">Status</th>
            <th class="text-left px-5 py-4">Ticket</th>
            <th class="text-left px-5 py-4">Registered</th>
            <th class="text-left px-5 py-4">Actions</th>
          </tr>
        </thead>
        <tbody id="events-table">
          <tr><td colspan="7" class="px-5 py-8 text-center text-gray-600 text-xs">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!Auth.isLoggedIn()) window.location.href = "/login.html";
    const initCeleb = getParam("celeb");
    let allEvents = [];
    const statusBadge = { upcoming:"bg-violet-900/60 text-violet-300", ongoing:"bg-green-900/60 text-green-300", completed:"bg-gray-700 text-gray-400", cancelled:"bg-red-900/60 text-red-300" };

    function renderTable(events) {
      const tbody = document.getElementById("events-table");
      if (!events.length) { tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-8 text-center text-gray-500">No events found.</td></tr>'; return; }
      tbody.innerHTML = events.map(ev => `
        <tr class="border-b border-white/5 hover:bg-white/3 transition">
          <td class="px-5 py-4">
            <div class="flex items-center gap-3">
              <img src="${mediaURL(ev.image)}" class="w-10 h-10 rounded-lg object-cover flex-shrink-0" />
              <span class="font-semibold">${ev.title}</span>
            </div>
          </td>
          <td class="px-5 py-4 text-gray-400">${ev.celebrity_name}</td>
          <td class="px-5 py-4 text-gray-400 text-xs">${formatDate(ev.event_date)}</td>
          <td class="px-5 py-4"><span class="text-xs px-2.5 py-1 rounded-full ${statusBadge[ev.status] || ''} capitalize">${ev.status}</span></td>
          <td class="px-5 py-4 text-gray-300">${ev.is_free ? '<span class="text-green-400 text-xs">Free</span>' : formatMoney(ev.ticket_price)}</td>
          <td class="px-5 py-4 text-gray-400">${ev.seats_booked}${ev.seats_total ? '/' + ev.seats_total : ''}</td>
          <td class="px-5 py-4">
            <div class="flex gap-2">
              <a href="/event-detail.html?celeb=${ev.celebrity_slug}&slug=${ev.slug}" class="text-xs text-violet-400 hover:text-violet-300">View</a>
              <a href="http://127.0.0.1:8000/admin/events/event/" target="_blank" class="text-xs text-amber-400 hover:text-amber-300">Edit</a>
            </div>
          </td>
        </tr>`).join("");
    }

    async function loadEvents() {
      const celeb = document.getElementById("celeb-filter").value;
      const status = document.getElementById("status-filter").value;
      try {
        const data = await EventsAPI.list(celeb || null, status);
        allEvents = data.results || data;
        renderTable(allEvents);
      } catch(e) {}
    }

    async function init() {
      try {
        const celebs = await CelebsAPI.list();
        const list = celebs.results || celebs;
        const sel = document.getElementById("celeb-filter");
        list.forEach(c => {
          const o = document.createElement("option");
          o.value = c.slug; o.textContent = c.name;
          if (c.slug === initCeleb) o.selected = true;
          sel.appendChild(o);
        });
      } catch(e) {}
      loadEvents();
      document.getElementById("celeb-filter").addEventListener("change", loadEvents);
      document.getElementById("status-filter").addEventListener("change", loadEvents);
    }
    init();
  </script>
</body>
</html>
