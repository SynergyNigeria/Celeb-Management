<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="StarHub" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Celebrities — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Montserrat","sans-serif"] } } } }</script>
  <style>body{background:#07070f;} .gradient-text{background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;} .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s;color:#9ca3af;} .sidebar-link:hover,.sidebar-link.active{background:rgba(139,92,246,0.15);color:#a78bfa;}</style>
</head>
<body class="font-sans text-white min-h-screen flex">

  <aside class="w-60 min-h-screen bg-black/60 border-r border-white/5 flex flex-col p-5 fixed top-0 left-0 z-40">
    <a href="/index.html" class="text-xl font-black gradient-text mb-8">★ StarHub</a>
    <div class="text-xs text-gray-600 uppercase tracking-widest mb-3 px-2">Admin Panel</div>
    <nav class="space-y-1 flex-1">
      <a href="/admin-panel/index.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin-panel/celebrities.html" class="sidebar-link active">🌟 Celebrities</a>
      <a href="/admin-panel/events.html" class="sidebar-link">🎟 Events</a>
      <a href="/admin-panel/memberships.html" class="sidebar-link">🎖 Memberships</a>
      <a href="/admin-panel/foundations.html" class="sidebar-link">❤️ Foundations</a>
      <a href="/admin-panel/users.html" class="sidebar-link">👥 Users</a>
    </nav>
    <div class="border-t border-white/5 pt-4 mt-4 space-y-2">
      <a href="http://127.0.0.1:8000/admin/" target="_blank" class="sidebar-link text-amber-400 hover:text-amber-300">⚙️ Django Admin</a>
      <a href="/index.html" class="sidebar-link">🏠 View Site</a>
      <button onclick="AuthAPI.logout()" class="sidebar-link w-full text-left text-red-400 hover:text-red-300">🚪 Logout</button>
    </div>
  </aside>

  <div class="ml-60 flex-1 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-black">🌟 <span class="gradient-text">Celebrities</span></h1>
        <p class="text-gray-500 text-sm mt-1">Manage all celebrity profiles</p>
      </div>
      <a href="http://127.0.0.1:8000/admin/celebs/celebrity/add/" target="_blank"
         class="bg-violet-600 hover:bg-violet-500 text-white font-bold px-6 py-2.5 rounded-full text-sm transition">
        + Add Celebrity
      </a>
    </div>

    <!-- Search -->
    <div class="flex gap-3 mb-6">
      <input id="search" type="text" placeholder="Search by name or nationality…" class="bg-white/5 border border-white/10 rounded-full px-5 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-violet-500 w-72 transition" />
      <select id="cat-filter" class="bg-white/5 border border-white/10 rounded-full px-4 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-violet-500 transition">
        <option value="">All Categories</option>
        <option value="music">Music</option><option value="sports">Sports</option>
        <option value="acting">Acting</option><option value="comedy">Comedy</option>
        <option value="politics">Politics</option><option value="business">Business</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Grid -->
    <div id="celebs-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
      <div class="animate-pulse bg-white/5 rounded-2xl h-56"></div>
      <div class="animate-pulse bg-white/5 rounded-2xl h-56"></div>
      <div class="animate-pulse bg-white/5 rounded-2xl h-56"></div>
    </div>
    <div id="no-results" class="hidden text-center py-14 text-gray-500">No celebrities match your filter.</div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!Auth.isLoggedIn()) window.location.href = "/login.html";
    let allCelebs = [];

    function render(list) {
      const grid = document.getElementById("celebs-grid");
      const empty = document.getElementById("no-results");
      if (!list.length) { grid.innerHTML = ""; empty.classList.remove("hidden"); return; }
      empty.classList.add("hidden");
      grid.innerHTML = list.map(c => `
        <div class="bg-white/5 border border-white/10 hover:border-violet-500/40 rounded-2xl overflow-hidden transition group">
          <div class="relative h-36">
            <img src="${mediaURL(c.photo)}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            ${c.is_featured ? '<span class="absolute top-2 right-2 bg-amber-500 text-black text-xs font-black px-2 py-0.5 rounded-full">★ Featured</span>' : ''}
          </div>
          <div class="p-4">
            <h3 class="font-bold truncate">${c.name}</h3>
            <p class="text-xs text-gray-400 capitalize mt-0.5">${c.category} · ${c.nationality || "—"}</p>
            <div class="flex gap-2 mt-3 flex-wrap">
              <a href="/celebrity.html?slug=${c.slug}" class="text-xs bg-violet-900/40 hover:bg-violet-800/60 text-violet-300 px-3 py-1.5 rounded-lg transition">View Page</a>
              <a href="http://127.0.0.1:8000/admin/celebs/celebrity/" target="_blank" class="text-xs bg-amber-900/40 hover:bg-amber-800/60 text-amber-300 px-3 py-1.5 rounded-lg transition">Edit</a>
              <a href="/admin-panel/events.html?celeb=${c.slug}" class="text-xs bg-white/5 hover:bg-white/10 text-gray-400 px-3 py-1.5 rounded-lg transition">Events</a>
            </div>
          </div>
        </div>
      `).join("");
    }

    function applyFilter() {
      const q = document.getElementById("search").value.toLowerCase();
      const cat = document.getElementById("cat-filter").value;
      render(allCelebs.filter(c => {
        const mq = !q || c.name.toLowerCase().includes(q) || (c.nationality||"").toLowerCase().includes(q);
        const mc = !cat || c.category === cat;
        return mq && mc;
      }));
    }

    async function init() {
      try {
        const d = await CelebsAPI.list();
        allCelebs = d.results || d;
        render(allCelebs);
      } catch(e) { document.getElementById("celebs-grid").innerHTML = `<p class="col-span-3 text-red-400 text-center">Failed to load.</p>`; }
      document.getElementById("search").addEventListener("input", applyFilter);
      document.getElementById("cat-filter").addEventListener("change", applyFilter);
    }
    init();
  </script>
</body>
</html>
