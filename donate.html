<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="StarHub" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Donate — StarHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Montserrat","sans-serif"] } } } }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>body{background:#0a0a14;} .gradient-text{background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}</style>
</head>
<body class="font-sans text-white min-h-screen">
  <!-- Page Transition Overlay -->
  <div id="page-transition" style="position:fixed;inset:0;background:#0a0a14;z-index:9999;pointer-events:none;"></div>
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/index.html" class="text-2xl font-black gradient-text">★ StarHub</a>
      <div id="nav-auth" class="flex items-center"></div>
    </div>
  </nav>

  <main class="pt-28 pb-24 max-w-5xl mx-auto px-6">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-black mb-2">Support a <span class="gradient-text">Cause</span></h1>
      <p class="text-gray-400" id="page-subtitle">Make an impact through charitable foundations</p>
    </div>

    <!-- Celeb filter (when no specific celeb) -->
    <div id="celeb-filter-bar" class="hidden mb-8">
      <select id="celeb-filter" class="bg-white/5 border border-white/10 rounded-full px-5 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">All Celebrities</option>
      </select>
    </div>

    <!-- Foundations grid -->
    <div id="foundations-container" class="grid md:grid-cols-2 gap-8 mb-16">
      <div class="animate-pulse bg-white/5 rounded-2xl h-64"></div>
      <div class="animate-pulse bg-white/5 rounded-2xl h-64"></div>
    </div>

    <!-- Donate Modal -->
    <div id="donate-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
      <div class="bg-[#12121e] border border-white/10 rounded-2xl w-full max-w-md p-8 shadow-2xl">
        <h2 class="text-2xl font-black mb-1">Donate</h2>
        <p id="modal-foundation-name" class="text-gray-400 text-sm mb-6"></p>
        <div class="mb-4">
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 block">Quick Amount</label>
          <div class="flex gap-2 flex-wrap">
            <button onclick="setAmount(5)" class="quick-amt bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-2 rounded-lg text-sm transition">$5</button>
            <button onclick="setAmount(10)" class="quick-amt bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-2 rounded-lg text-sm transition">$10</button>
            <button onclick="setAmount(25)" class="quick-amt bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-2 rounded-lg text-sm transition">$25</button>
            <button onclick="setAmount(50)" class="quick-amt bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-2 rounded-lg text-sm transition">$50</button>
            <button onclick="setAmount(100)" class="quick-amt bg-white/5 hover:bg-violet-600 border border-white/10 px-4 py-2 rounded-lg text-sm transition">$100</button>
          </div>
        </div>
        <div class="space-y-4">
          <div>
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1 block">Custom Amount ($)</label>
            <input id="donate-amount" type="number" min="1" placeholder="Enter amount" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500" />
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1 block">Message (optional)</label>
            <textarea id="donate-message" placeholder="Leave a message of support…" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 resize-none"></textarea>
          </div>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="donate-anon" class="w-4 h-4 accent-violet-500" />
            <span class="text-sm text-gray-300">Donate anonymously</span>
          </label>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="closeModal()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-3 rounded-xl text-sm transition">Cancel</button>
          <button id="donate-btn" onclick="submitDonation()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-black font-bold py-3 rounded-xl text-sm transition">Donate</button>
        </div>
      </div>
    </div>

    <!-- Recent Donations -->
    <div id="recent-section" class="hidden">
      <h2 class="text-xl font-bold mb-4">Recent Donors</h2>
      <div id="recent-list" class="space-y-3"></div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    let activeFid = null;
    const celebSlug = getParam("celeb");
    const presetFid = getParam("foundation");

    function setAmount(n) { document.getElementById("donate-amount").value = n; }
    function closeModal() { document.getElementById("donate-modal").classList.add("hidden"); activeFid = null; }
    function openModal(fid, fname) {
      if (!requireAuth()) return;
      activeFid = fid;
      document.getElementById("modal-foundation-name").textContent = fname;
      document.getElementById("donate-amount").value = "";
      document.getElementById("donate-message").value = "";
      document.getElementById("donate-anon").checked = false;
      document.getElementById("donate-modal").classList.remove("hidden");
    }

    async function submitDonation() {
      if (!activeFid) return;
      const amount = parseFloat(document.getElementById("donate-amount").value);
      if (!amount || amount < 1) { showToast("Enter a valid amount (min $1).", "warning"); return; }
      const btn = document.getElementById("donate-btn");
      setLoading(btn, true, "Donate");
      try {
        await DonationsAPI.donate({
          foundation_id: activeFid,
          amount: amount,
          message: document.getElementById("donate-message").value,
          is_anonymous: document.getElementById("donate-anon").checked,
        });
        showToast("Thank you for your donation! ❤️");
        closeModal();
        loadFoundations(celebSlug);
      } catch(e) {
        showToast(e.detail || "Donation failed.", "error");
      } finally { setLoading(btn, false, "Donate"); }
    }

    async function loadFoundations(filterSlug) {
      const container = document.getElementById("foundations-container");
      try {
        const data = await DonationsAPI.foundations(filterSlug);
        const list = data.results || data;
        if (!list.length) { container.innerHTML = '<p class="col-span-2 text-center text-gray-500 py-10">No foundations found.</p>'; return; }
        container.innerHTML = list.map(f => `
          <div class="bg-white/5 border border-white/10 hover:border-violet-500/40 rounded-2xl overflow-hidden transition group">
            <img src="${mediaURL(f.cover_image)}" class="w-full h-44 object-cover group-hover:opacity-90 transition" />
            <div class="p-6">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs text-violet-400 font-semibold">${f.celebrity_name}</span>
                ${f.cause_type ? `<span class="text-xs bg-white/8 text-gray-400 px-2 py-0.5 rounded">${f.cause_type}</span>` : ""}
              </div>
              <h3 class="text-lg font-bold mb-2">${f.name}</h3>
              <p class="text-gray-400 text-sm mb-4 line-clamp-2">${f.description}</p>
              <div class="flex justify-between text-xs text-gray-500 mb-1">
                <span>${formatMoney(f.amount_raised)} raised</span>
                <span>Goal: ${formatMoney(f.target_amount)}</span>
              </div>
              <div class="w-full bg-white/10 rounded-full h-2 mb-5">
                <div class="bg-amber-500 h-2 rounded-full" style="width:${Math.min(f.progress_pct,100)}%"></div>
              </div>
              <button onclick="openModal(${f.id}, '${f.name.replace(/'/g,"\\'")}')" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-bold py-2.5 rounded-xl text-sm transition">Donate Now</button>
            </div>
          </div>
        `).join("");
      } catch(e) { container.innerHTML = '<p class="col-span-2 text-red-400 text-center py-10">Failed to load foundations.</p>'; }
    }

    async function init() {
      updateNavAuth();
      if (celebSlug) {
        try {
          const c = await CelebsAPI.detail(celebSlug);
          document.getElementById("page-subtitle").textContent = `Support ${c.name}'s charitable causes`;
        } catch(e) {}
        loadFoundations(celebSlug);
      } else {
        document.getElementById("celeb-filter-bar").classList.remove("hidden");
        try {
          const celebs = await CelebsAPI.list();
          const opts = (celebs.results || celebs).map(c => `<option value="${c.slug}">${c.name}</option>`).join("");
          document.getElementById("celeb-filter").innerHTML += opts;
          document.getElementById("celeb-filter").addEventListener("change", e => loadFoundations(e.target.value || null));
        } catch(e) {}
        loadFoundations(null);
      }
    }
    init();
  </script>

  <script>
    // === GSAP Animations ===
    gsap.registerPlugin(ScrollTrigger);

    // 1. Fade page in
    gsap.to("#page-transition", {
      opacity: 0, duration: 0.5, ease: "power2.out", delay: 0.05,
      onComplete() { const el = document.getElementById("page-transition"); if (el) el.style.display = "none"; }
    });

    // 2. Header entrance
    gsap.timeline({ delay: 0.1 })
      .from("main .text-center h1", { opacity: 0, y: 25, duration: 0.65, ease: "power3.out" })
      .from("#page-subtitle", { opacity: 0, y: 15, duration: 0.5, ease: "power3.out" }, "-=0.3");

    // 3. Foundation cards — animate when dynamically populated
    const foundationsCont = document.getElementById("foundations-container");
    if (foundationsCont) {
      new MutationObserver(() => {
        const cards = foundationsCont.querySelectorAll(":scope > *:not(.gsap-done)");
        if (cards.length && !cards[0].classList.contains("animate-pulse")) {
          cards.forEach(c => c.classList.add("gsap-done"));
          gsap.from(cards, {
            opacity: 0, y: 35, duration: 0.55, ease: "power3.out", stagger: 0.1,
            scrollTrigger: { trigger: foundationsCont, start: "top 85%" }
          });
        }
      }).observe(foundationsCont, { childList: true });
    }

    // 4. Page-out transition on internal link clicks
    function _pageOut(dest) {
      const o = document.getElementById("page-transition");
      if (!o) { window.location.href = dest; return; }
      o.style.display = "block";
      gsap.fromTo(o, { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power2.in", onComplete: () => { window.location.href = dest; } });
    }
    document.addEventListener("click", e => {
      const link = e.target.closest("a[href]");
      if (!link) return;
      try {
        const u = new URL(link.href);
        if (u.hostname === location.hostname && !link.href.startsWith("#") && link.target !== "_blank") {
          e.preventDefault(); _pageOut(link.href);
        }
      } catch (_) {}
    });
  </script>
</body>
</html>
