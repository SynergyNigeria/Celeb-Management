<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - StarHub</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e0a3c 0%, #0a0a14 60%);
      color: #fff;
      font-family: Montserrat, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .brand {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #cbd5e1;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      color: #0a0a14;
      background: #f59e0b;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">StarHub</div>
    <p>You are offline right now. Reconnect to keep browsing celebrities, events, and your account.</p>
    <a href="/index.html">Try Again</a>
  </div>
</body>
</html>
