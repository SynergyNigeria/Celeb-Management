<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="StarHub" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Login — StarHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ["Montserrat","sans-serif"] } } } }</script>
  <style>body{background:#0a0a14;} .gradient-text{background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}</style>
</head>
<body class="font-sans text-white min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/index.html" class="text-3xl font-black gradient-text">★ StarHub</a>
      <p class="text-gray-400 text-sm mt-2">Sign in to your fan account</p>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl">
      <form id="login-form" class="space-y-5">
        <div>
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1.5 block">Email Address</label>
          <input type="email" id="email" required autocomplete="email"
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 transition placeholder-gray-600"
            placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1.5 block">Password</label>
          <input type="password" id="password" required autocomplete="current-password"
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 transition placeholder-gray-600"
            placeholder="••••••••" />
        </div>

        <div id="error-msg" class="hidden bg-red-900/30 border border-red-700/40 text-red-300 text-sm rounded-xl px-4 py-3"></div>

        <button type="submit" id="submit-btn" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-black py-3.5 rounded-xl transition text-sm mt-2">
          Sign In
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="/register.html" class="text-violet-400 hover:text-violet-300 font-semibold transition">Sign Up</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = "/dashboard.html";

    document.getElementById("login-form").addEventListener("submit", async e => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const errEl = document.getElementById("error-msg");
      errEl.classList.add("hidden");
      setLoading(btn, true, "Sign In");

      try {
        await AuthAPI.login({
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        });
        const next = getParam("next");
        window.location.href = next ? decodeURIComponent(next) : "/dashboard.html";
      } catch(err) {
        const msg = err?.detail || err?.non_field_errors?.[0] || "Invalid email or password.";
        errEl.textContent = msg;
        errEl.classList.remove("hidden");
        setLoading(btn, false, "Sign In");
      }
    });
  </script>
</body>
</html>
